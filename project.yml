name: FactoryFloor
options:
  bundleIdPrefix: com.alltuner
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_OBJC_BRIDGING_HEADER: Resources/FactoryFloor-Bridging-Header.h
    HEADER_SEARCH_PATHS:
      - $(PROJECT_DIR)/ghostty/include
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"

packages:
  swift-cmark:
    url: https://github.com/swiftlang/swift-cmark
    from: "0.6.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "9.7.0"

targets:
  FactoryFloor:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - Launcher
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Localization/en.lproj/Localizable.strings
        buildPhase: resources
      - path: Localization/ca.lproj/Localizable.strings
        buildPhase: resources
      - path: Localization/es.lproj/Localizable.strings
        buildPhase: resources
      - path: Localization/sv.lproj/Localizable.strings
        buildPhase: resources
      - path: Resources/Scripts/ff
        buildPhase: resources
    settings:
      base:
        PRODUCT_MODULE_NAME: FactoryFloor
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/ff2.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        LIBRARY_SEARCH_PATHS:
          - $(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64
        OTHER_LDFLAGS:
          - -lghostty
          - -lz
          - -lc++
          - -framework Metal
          - -framework MetalKit
          - -framework CoreGraphics
          - -framework CoreText
          - -framework Foundation
          - -framework IOSurface
          - -framework QuartzCore
          - -framework AppKit
          - -framework IOKit
          - -framework Carbon
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.alltuner.factoryfloor.debug
          PRODUCT_NAME: Factory Floor Debug
          INFOPLIST_KEY_CFBundleDisplayName: Factory Floor Debug
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIconDebug
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          FF_URL_SCHEME: factoryfloor-debug
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.alltuner.factoryfloor
          PRODUCT_NAME: Factory Floor
          FF_URL_SCHEME: factoryfloor
    dependencies:
      - target: FFRun
      - package: swift-cmark
        product: cmark-gfm
      - package: swift-cmark
        product: cmark-gfm-extensions
      - package: Sentry
        product: Sentry
    postBuildScripts:
      - script: |
          set -e
          mkdir -p "${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Helpers"
          cp -f "${BUILT_PRODUCTS_DIR}/ff-run" "${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Helpers/ff-run"
          chmod +x "${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Helpers/ff-run"
          codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" --timestamp --generate-entitlement-der "${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Helpers/ff-run"
        name: Bundle ff-run
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/ff-run

  FFRun:
    type: tool
    platform: macOS
    sources:
      - path: Sources
        includes:
          - Launcher/**
          - Models/AppConstants.swift
          - Models/FilePersistence.swift
          - Models/RunState.swift
    settings:
      base:
        PRODUCT_NAME: ff-run
        OTHER_LDFLAGS:
          - -lproc
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

  FactoryFloorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: FactoryFloor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alltuner.factoryfloor.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Factory Floor Debug.app/Contents/MacOS/Factory Floor Debug"
