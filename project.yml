name: ff2
options:
  bundleIdPrefix: com.ff2
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_OBJC_BRIDGING_HEADER: ff2-Bridging-Header.h
    HEADER_SEARCH_PATHS:
      - $(PROJECT_DIR)/ghostty/include
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"

targets:
  ff2:
    type: application
    platform: macOS
    sources:
      - Sources
    resources:
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ff2.app
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/ff2.entitlements
        GENERATE_INFOPLIST_FILE: false
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        LIBRARY_SEARCH_PATHS:
          - $(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64
        OTHER_LDFLAGS:
          - -lghostty
          - -lz
          - -lc++
          - -framework Metal
          - -framework MetalKit
          - -framework CoreGraphics
          - -framework CoreText
          - -framework Foundation
          - -framework IOSurface
          - -framework QuartzCore
          - -framework AppKit
          - -framework IOKit
          - -framework Carbon

  ff2Tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: ff2
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ff2.tests
        GENERATE_INFOPLIST_FILE: true
