name: FactoryFloor
options:
  bundleIdPrefix: com.alltuner
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_OBJC_BRIDGING_HEADER: Resources/FactoryFloor-Bridging-Header.h
    HEADER_SEARCH_PATHS:
      - $(PROJECT_DIR)/ghostty/include
    OTHER_SWIFT_FLAGS:
      - "-Xcc"
      - "-Wno-incomplete-umbrella"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_REQUIRED: "NO"


packages:
  swift-cmark:
    url: https://github.com/swiftlang/swift-cmark
    from: "0.6.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "9.7.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.0"

targets:
  FactoryFloor:
    type: application
    platform: macOS
    info:
      path: FactoryFloor/Info.plist
      properties:
        CFBundleDisplayName: $(PRODUCT_NAME)
        CFBundleVersion: "0.1.76" # x-release-please-version
        CFBundleShortVersionString: "0.1.76" # x-release-please-version
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSMainStoryboardFile: ""
        NSPrincipalClass: NSApplication
        LSUIElement: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        SUPublicEDKey: "grC1rloxT0gFZ2mQVIuDTZlkNFXwXLZhn9+xs4YGuXo="
        SUFeedURL: https://factory-floor.com/appcast.xml
        SUEnableAutomaticChecks: true
        CFBundleURLTypes:
          - CFBundleURLName: com.alltuner.factoryfloor.open
            CFBundleURLSchemes:
              - $(FF_URL_SCHEME)
        NSAppleEventsUsageDescription: A program running within Factory Floor would like to use AppleScript.
        NSAudioCaptureUsageDescription: A program running within Factory Floor would like to access your system's audio.
        NSBluetoothAlwaysUsageDescription: A program running within Factory Floor would like to use Bluetooth.
        NSCalendarsUsageDescription: A program running within Factory Floor would like to access your Calendar.
        NSCameraUsageDescription: A program running within Factory Floor would like to use the camera.
        NSContactsUsageDescription: A program running within Factory Floor would like to access your Contacts.
        NSLocalNetworkUsageDescription: A program running within Factory Floor would like to access the local network.
        NSLocationTemporaryUsageDescriptionDictionary: A program running within Factory Floor would like to use your location temporarily.
        NSLocationUsageDescription: A program running within Factory Floor would like to access your location information.
        NSMicrophoneUsageDescription: A program running within Factory Floor would like to use your microphone.
        NSMotionUsageDescription: A program running within Factory Floor would like to access motion data.
        NSPhotoLibraryUsageDescription: A program running within Factory Floor would like to access your Photo Library.
        NSRemindersUsageDescription: A program running within Factory Floor would like to access your reminders.
        NSSpeechRecognitionUsageDescription: A program running within Factory Floor would like to use speech recognition.
        NSSystemAdministrationUsageDescription: A program running within Factory Floor requires elevated privileges.
    sources:
      - path: Sources
        excludes:
          - Launcher
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Localization/en.lproj/Localizable.strings
        buildPhase: resources
      - path: Localization/ca.lproj/Localizable.strings
        buildPhase: resources
      - path: Localization/es.lproj/Localizable.strings
        buildPhase: resources
      - path: Localization/sv.lproj/Localizable.strings
        buildPhase: resources
      - path: Localization/en.lproj/InfoPlist.strings
        buildPhase: resources
      - path: Localization/ca.lproj/InfoPlist.strings
        buildPhase: resources
      - path: Localization/es.lproj/InfoPlist.strings
        buildPhase: resources
      - path: Localization/sv.lproj/InfoPlist.strings
        buildPhase: resources
      - path: Localization/de.lproj/Localizable.strings
        buildPhase: resources
      - path: Localization/de.lproj/InfoPlist.strings
        buildPhase: resources
      - path: Resources/Scripts/ff
        buildPhase: resources
      - path: Resources/notification.wav
        buildPhase: resources
      - path: ghostty/zig-out/share/terminfo
        type: folder
        buildPhase: resources
      - path: ghostty/zig-out/share/ghostty
        type: folder
        buildPhase: resources
      - path: Resources/MonacoEditor
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_MODULE_NAME: FactoryFloor
        CODE_SIGN_ENTITLEMENTS: Resources/ff2.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        LIBRARY_SEARCH_PATHS:
          - $(PROJECT_DIR)/ghostty/macos/GhosttyKit.xcframework/macos-arm64_x86_64
        OTHER_LDFLAGS:
          - -lghostty
          - -lz
          - -lc++
          - -framework Metal
          - -framework MetalKit
          - -framework CoreGraphics
          - -framework CoreText
          - -framework Foundation
          - -framework IOSurface
          - -framework QuartzCore
          - -framework AppKit
          - -framework IOKit
          - -framework Carbon
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.alltuner.factoryfloor.debug
          PRODUCT_NAME: Factory Floor Debug
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIconDebug
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          FF_URL_SCHEME: factoryfloor-debug
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.alltuner.factoryfloor
          PRODUCT_NAME: Factory Floor
          FF_URL_SCHEME: factoryfloor
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    dependencies:
      - target: FFRun
      - package: swift-cmark
        product: cmark-gfm
      - package: swift-cmark
        product: cmark-gfm-extensions
      - package: Sentry
        product: Sentry
      - package: Sparkle
        product: Sparkle
    preBuildScripts:
      - script: |
          set -e
          "${PROJECT_DIR}/scripts/build-editor.sh"
        name: Build Monaco Editor
        inputFiles:
          - $(PROJECT_DIR)/editor/package.json
          - $(PROJECT_DIR)/editor/bun.lock
          - $(PROJECT_DIR)/editor/src/main.js
          - $(PROJECT_DIR)/editor/index.html
          - $(PROJECT_DIR)/editor/vite.config.js
        outputFiles:
          - $(PROJECT_DIR)/Resources/MonacoEditor/index.html
    postBuildScripts:
      - script: |
          set -e
          mkdir -p "${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Helpers"
          cp -f "${BUILT_PRODUCTS_DIR}/ff-run" "${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Helpers/ff-run"
          chmod +x "${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Helpers/ff-run"
          codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" --timestamp --options=runtime --generate-entitlement-der "${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Helpers/ff-run"
        name: Bundle ff-run
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/ff-run

  FFRun:
    type: tool
    platform: macOS
    sources:
      - path: Sources
        includes:
          - Launcher/**
          - Models/AppConstants.swift
          - Models/FilePersistence.swift
          - Models/RunState.swift
    settings:
      base:
        PRODUCT_NAME: ff-run
        OTHER_LDFLAGS:
          - -lproc
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

  FactoryFloorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: FactoryFloor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alltuner.factoryfloor.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Factory Floor Debug.app/Contents/MacOS/Factory Floor Debug"
