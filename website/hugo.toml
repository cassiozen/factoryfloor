# ABOUTME: Hugo configuration for the Factory Floor website.
# ABOUTME: Multi-language site deployed to factory-floor.com via GitHub Pages.

baseURL = "https://factory-floor.com"
title = "Factory Floor"
defaultContentLanguage = "en"

[languages.en]
  languageCode = "en"
  languageName = "English"
  weight = 1
  contentDir = "content"

[languages.ca]
  languageCode = "ca"
  languageName = "Catala"
  weight = 2
  contentDir = "content/ca"

[languages.es]
  languageCode = "es"
  languageName = "Espanol"
  weight = 3
  contentDir = "content/es"

[languages.sv]
  languageCode = "sv"
  languageName = "Svenska"
  weight = 4
  contentDir = "content/sv"

[params]
  description = "A native macOS app that manages git worktrees, Claude Code sessions, and dev servers from a single window."
  ogImage = "/img/og-image.png"
  githubURL = "https://github.com/alltuner/factoryfloor"
  downloadURL = "https://github.com/alltuner/factoryfloor/releases/latest/download/FactoryFloor.dmg"
  analyticsID = "81a482e5-52a9-467e-87f8-28c38f2d7e9e"
  analyticsSrc = "https://meta.factory-floor.com/meta.js"

[module]
  [[module.mounts]]
    source = "assets"
    target = "assets"

[markup.goldmark.renderer]
  unsafe = true


[markup.tableOfContents]
  startLevel = 2
  endLevel = 3
