# Features
[features_label]
other = "Features"
[features_title]
other = "Everything in one window."
[features_desc]
other = "No more juggling terminals, browsers, and git clients. Each workstream is a self-contained development environment."
[feat_worktrees_title]
other = "Git Worktrees"
[feat_worktrees_desc]
other = "Each workstream gets its own branch and worktree. Switch between tasks without stashing, with .env files automatically symlinked."
[feat_claude_title]
other = "Claude Code"
[feat_claude_desc]
other = "Integrated <a href='https://docs.anthropic.com/en/docs/claude-code/overview' class='text-wine-light no-underline hover:underline'>Claude Code</a> agent with session persistence. Resume conversations across app restarts with automatic session IDs."
[feat_tmux_title]
other = "Tmux Persistence"
[feat_tmux_desc]
other = "Agent sessions survive app restarts via tmux on a dedicated socket. No more lost context or interrupted workflows."
[feat_scripts_title]
other = "Setup & Run Scripts"
[feat_scripts_desc]
other = "Configure setup, run, and teardown scripts per project via .factoryfloor.json."
[feat_browser_title]
other = "Embedded Browser"
[feat_browser_desc]
other = "Embedded browser with auto-port detection. The run script's listening port is detected automatically and the browser navigates to it. Preview your app without leaving the workspace."
[feat_github_title]
other = "GitHub Integration"
[feat_github_desc]
other = "See repo info, open PRs, and branch PR status directly in the project view. Powered by the gh CLI."

# How it works
[how_label]
other = "How it works"
[how_title]
other = "Three steps to parallel development."
[how_desc]
other = "Go from repo to running workstream in seconds. Each workstream is isolated and self-contained."
[step1_title]
other = "Add a project"
[step1_desc]
other = "Drop a directory on the sidebar, or create a new one. Factory Floor detects git repos, installed tools, and GitHub connections automatically."
[step2_title]
other = "Create a workstream"
[step2_desc]
other = "A new git worktree with a fresh branch, a Claude Code session, a terminal, and a browser tab. Port detection is automatic — the browser opens your dev server as soon as it starts listening."
[step3_title]
other = "Code with AI"
[step3_desc]
other = "The coding agent renames your branch to match the task. Setup scripts install dependencies. Switch between workstreams without losing state."

# Config
[config_label]
other = "Configuration"
[config_title]
other = "Drop-in script config."
[config_desc]
other = "Automate your workstream lifecycle with setup, run, and teardown scripts. Install dependencies when a worktree is created, start dev servers on demand, and clean up resources when archiving."
[config_add]
other = "Add a"
[config_or_use]
other = "to your project root."
[config_hook]
other = "Hook"
[config_when]
other = "When it runs"
[config_setup_desc]
other = "Once, when a workstream is created. Use for installing dependencies or build steps."
[config_run_desc]
other = "On demand via the Environment tab. Wrapped in ff-run for automatic port detection."
[config_teardown_desc]
other = "When a workstream is archived. Use for cleanup like stopping containers."
[config_optional_note]
other = "All fields are optional. Scripts run in the workstream directory using your login shell."

