[hero_title_1]
other = "El teu"
[hero_title_accent]
other = "entorn de desenvolupament"
[hero_title_2]
other = "amb IA."
[hero_desc]
other = "App nativa de macOS sobre el terminal GPU de <a href=\"https://ghostty.org\" class=\"text-wine-light hover:underline\">Ghostty</a>. Gestiona git worktrees, sessions de <a href=\"https://docs.anthropic.com/en/docs/claude-code/overview\" class=\"text-wine-light hover:underline\">Claude Code</a> i servidors dev des d'una sola finestra. Cada workstream té branch, terminal i agent propis, tot en paral·lel, tot a velocitat nativa."
[hero_download]
other = "Descarrega"
[hero_source]
other = "Codi font"

# Features
[features_label]
other = "Funcionalitats"
[features_title]
other = "Tot en una finestra."
[features_desc]
other = "Prou de fer malabars amb terminals, browsers i clients git. Cada workstream és un entorn dev complet."
[feat_worktrees_title]
other = "Git Worktrees"
[feat_worktrees_desc]
other = "Cada workstream té branch i worktree propis. Canvia de tasca sense stash, amb fitxers .env symlinkats automàticament."
[feat_claude_title]
other = "Claude Code"
[feat_claude_desc]
other = "Agent <a href='https://docs.anthropic.com/en/docs/claude-code/overview' class='text-wine-light no-underline hover:underline'>Claude Code</a> integrat amb persistència de sessió. Reprèn converses entre reinicis amb session IDs automàtics."
[feat_tmux_title]
other = "Persistència tmux"
[feat_tmux_desc]
other = "Les sessions d'agent sobreviuen reinicis via tmux en un socket dedicat. Mai més context perdut ni workflows interromputs."
[feat_scripts_title]
other = "Setup & Run Scripts"
[feat_scripts_desc]
other = "Configura scripts de setup, run i teardown per projecte via .factoryfloor.json."
[feat_browser_title]
other = "Browser integrat"
[feat_browser_desc]
other = "Browser integrat amb detecció automàtica de port. El port d'escolta del run script es detecta automàticament i el browser hi navega. Previsualitza l'app sense sortir del workspace."
[feat_github_title]
other = "Integració GitHub"
[feat_github_desc]
other = "Info del repo, PRs obertes i estat de PRs per branch, directament a la vista del projecte. Via gh CLI."

# How it works
[how_label]
other = "Com funciona"
[how_title]
other = "Tres passos per desenvolupar en paral·lel."
[how_desc]
other = "Del repo a un workstream actiu en segons. Cada workstream és aïllat i autònom."
[step1_title]
other = "Afegeix un projecte"
[step1_desc]
other = "Arrossega un directori al sidebar o crea'n un de nou. Factory Floor detecta repos git, eines instal·lades i connexions GitHub automàticament."
[step2_title]
other = "Crea un workstream"
[step2_desc]
other = "Un worktree nou amb branch, sessió de Claude Code, terminal i tab de browser. La detecció de port és automàtica — el browser obre el teu servidor dev tan bon punt comença a escoltar."
[step3_title]
other = "Programa amb IA"
[step3_desc]
other = "L'agent renomena el branch per la tasca. Els setup scripts instal·len dependències. Canvia entre workstreams sense perdre estat."

