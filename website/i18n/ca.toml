# Features
[features_label]
other = "Funcionalitats"
[features_title]
other = "Tot en una sola finestra."
[features_desc]
other = "Prou de fer malabars amb terminals, navegadors i clients git. Cada workstream és un entorn de desenvolupament autònom."
[feat_worktrees_title]
other = "Git Worktrees"
[feat_worktrees_desc]
other = "Cada workstream té la seva pròpia branca i worktree. Canvia de tasca sense fer stash, amb els fitxers .env enllaçats automàticament."
[feat_claude_title]
other = "Claude Code"
[feat_claude_desc]
other = "Agent d'IA integrat amb persistència de sessions. Reprèn converses entre reinicis de l'app amb identificadors de sessió automàtics."
[feat_tmux_title]
other = "Persistència amb Tmux"
[feat_tmux_desc]
other = "Les sessions de l'agent sobreviuen als reinicis de l'app via tmux en un socket dedicat. Mai més context perdut ni fluxos de treball interromputs."
[feat_scripts_title]
other = "Scripts de configuració i execució"
[feat_scripts_desc]
other = "Configura scripts de preparació, execució i desmuntatge per projecte. Compatible amb configuracions d'emdash, conductor i superset."
[feat_browser_title]
other = "Navegador integrat"
[feat_browser_desc]
other = "Pestanya de navegador WKWebView amb assignació de ports determinista. Previsualitza la teva app sense sortir de l'espai de treball."
[feat_github_title]
other = "Integració amb GitHub"
[feat_github_desc]
other = "Consulta informació del repositori, PRs obertes i l'estat de PRs per branca directament a la vista del projecte. Funciona amb el CLI de gh."

# How it works
[how_label]
other = "Com funciona"
[how_title]
other = "Tres passos per al desenvolupament en paral·lel."
[how_desc]
other = "Del repositori a un workstream en funcionament en segons. Cada workstream és aïllat i autònom."
[step1_title]
other = "Afegeix un projecte"
[step1_desc]
other = "Arrossega un directori a la barra lateral, o crea'n un de nou. Factory Floor detecta automàticament repositoris git, eines instal·lades i connexions amb GitHub."
[step2_title]
other = "Crea un workstream"
[step2_desc]
other = "Un nou git worktree amb una branca nova, una sessió de Claude Code, un terminal i una pestanya de navegador. Tot connectat i llest per començar."
[step3_title]
other = "Programa amb IA"
[step3_desc]
other = "L'agent de programació renombra la branca per adaptar-la a la tasca. Els scripts de preparació instal·len les dependències. Canvia entre workstreams sense perdre l'estat."

