[hero_desc]
other = "Una app nativa de macOS construida sobre la terminal con renderizado GPU de <a href=\"https://ghostty.org\" class=\"text-wine-light hover:underline\">Ghostty</a>. Gestiona worktrees de git, sesiones de Claude Code y servidores de desarrollo desde una sola ventana. Cada workstream tiene su propia rama, terminal y agente de IA — todo en paralelo, todo a velocidad nativa."
