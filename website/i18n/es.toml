[features_label]
other = "Características"
[features_title]
other = "Todo en una sola ventana."
[features_desc]
other = "Se acabó hacer malabares con terminales, navegadores y clientes git. Cada workstream es un entorno de desarrollo autocontenido."
[feat_worktrees_title]
other = "Git Worktrees"
[feat_worktrees_desc]
other = "Cada workstream tiene su propia rama y worktree. Cambia entre tareas sin stash, con archivos .env enlazados automáticamente."
[feat_claude_title]
other = "Claude Code"
[feat_claude_desc]
other = "Agente de IA integrado con persistencia de sesión. Retoma conversaciones entre reinicios de la app con IDs de sesión automáticos."
[feat_tmux_title]
other = "Persistencia con Tmux"
[feat_tmux_desc]
other = "Las sesiones del agente sobreviven a reinicios de la app gracias a tmux en un socket dedicado. Sin perder contexto ni interrumpir flujos de trabajo."
[feat_scripts_title]
other = "Scripts de Setup y Run"
[feat_scripts_desc]
other = "Configura scripts de setup, run y teardown por proyecto. Compatible con configuraciones de emdash, conductor y superset."
[feat_browser_title]
other = "Navegador integrado"
[feat_browser_desc]
other = "Pestaña de navegador con WKWebView y asignación determinista de puertos. Previsualiza tu app sin salir del espacio de trabajo."
[feat_github_title]
other = "Integración con GitHub"
[feat_github_desc]
other = "Consulta información del repositorio, PRs abiertas y el estado de PRs por rama directamente en la vista de proyecto. Funciona con el CLI de gh."

[how_label]
other = "Cómo funciona"
[how_title]
other = "Tres pasos para desarrollar en paralelo."
[how_desc]
other = "De repositorio a workstream en segundos. Cada workstream está aislado y es autocontenido."
[step1_title]
other = "Añade un proyecto"
[step1_desc]
other = "Arrastra un directorio a la barra lateral o crea uno nuevo. Factory Floor detecta automáticamente repos git, herramientas instaladas y conexiones con GitHub."
[step2_title]
other = "Crea un workstream"
[step2_desc]
other = "Un nuevo worktree de git con una rama limpia, una sesión de Claude Code, una terminal y una pestaña de navegador. Todo conectado y listo para usar."
[step3_title]
other = "Programa con IA"
[step3_desc]
other = "El agente de código renombra tu rama para que coincida con la tarea. Los scripts de setup instalan dependencias. Cambia entre workstreams sin perder estado."

[config_label]
