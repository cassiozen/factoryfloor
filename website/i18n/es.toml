[features_label]
other = "Características"
[features_title]
other = "Todo en una ventana."
[features_desc]
other = "Basta de hacer malabares con terminales, browsers y clientes git. Cada workstream es un entorno dev completo."
[feat_worktrees_title]
other = "Git Worktrees"
[feat_worktrees_desc]
other = "Cada workstream tiene su branch y worktree. Cambia de tarea sin stash, con archivos .env enlazados automáticamente."
[feat_claude_title]
other = "Claude Code"
[feat_claude_desc]
other = "Agent <a href='https://docs.anthropic.com/en/docs/claude-code/overview' class='text-wine-light no-underline hover:underline'>Claude Code</a> integrado con persistencia de sesión. Retoma conversaciones entre reinicios con session IDs automáticos."
[feat_tmux_title]
other = "Persistencia tmux"
[feat_tmux_desc]
other = "Las sesiones del agent sobreviven reinicios via tmux en un socket dedicado. Sin contexto perdido ni workflows interrumpidos."
[feat_scripts_title]
other = "Setup & Run Scripts"
[feat_scripts_desc]
other = "Configura scripts de setup, run y teardown por proyecto via .factoryfloor.json."
[feat_browser_title]
other = "Browser integrado"
[feat_browser_desc]
other = "Browser integrado con detección automática de puerto. El puerto de escucha del run script se detecta automáticamente y el browser navega a él. Previsualiza tu app sin salir del workspace."
[feat_review_title]
other = "Guía de revisión"
[feat_review_desc]
other = "Revisa cambios con confianza. El agent explica su razonamiento con orden de lectura y anotaciones inline en cada worktree."
[feat_editor_title]
other = "Editor de código"
[feat_editor_desc]
other = "Editor Monaco integrado con resaltado de sintaxis y soporte de lenguajes. Ediciones rápidas sin salir del workspace."
[feat_github_title]
other = "Integración GitHub"
[feat_github_desc]
other = "Info del repo, PRs abiertas y estado de PRs por branch, directo en la vista de proyecto. Via gh CLI."
[feat_soon_title]
other = "Más por venir"
[feat_soon_desc]
other = "Nuevas funcionalidades en camino."

[how_label]
other = "Cómo funciona"
[how_title]
other = "Tres pasos para desarrollo en paralelo."
[how_desc]
other = "De repo a workstream activo en segundos. Cada workstream aislado y autónomo."
[step1_title]
other = "Añade un proyecto"
[step1_desc]
other = "Arrastra un directorio al sidebar o crea uno nuevo. Factory Floor detecta repos git, herramientas instaladas y conexiones GitHub automáticamente."
[step2_title]
other = "Crea un workstream"
[step2_desc]
other = "Un worktree nuevo con branch, sesión de Claude Code, terminal y tab de browser. La detección de puerto es automática — el browser abre tu servidor dev en cuanto empieza a escuchar."
[step3_title]
other = "Programa con IA"
[step3_desc]
other = "El agent renombra tu branch para la tarea. Los setup scripts instalan dependencias. Cambia entre workstreams sin perder estado."

[config_label]
other = "Configuración"
[config_title]
other = "Scripts drop-in."
[config_desc]
other = "Automatiza el ciclo de vida de workstreams con scripts de setup, run y teardown. Instala dependencias al crear un worktree, arranca servidores dev bajo demanda y libera recursos al archivar."
[config_add]
other = "Añade un"
[config_or_use]
other = "a la raíz de tu proyecto."
[config_hook]
other = "Hook"
[config_when]
other = "Cuándo se ejecuta"
[config_setup_desc]
other = "Una vez, al crear un workstream. Para instalar dependencias o pasos de build."
[config_run_desc]
other = "Bajo demanda desde la pestaña Environment. Envuelto en ff-run para detección automática de puertos."
[config_teardown_desc]
other = "Al archivar un workstream. Para limpiar recursos como detener contenedores."
[config_optional_note]
other = "Todos los campos son opcionales. Los scripts se ejecutan en el directorio del workstream con tu shell de login."

