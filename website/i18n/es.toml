[hero_desc]
other = "App nativa de macOS sobre el terminal GPU de <a href=\"https://ghostty.org\" class=\"text-wine-light hover:underline\">Ghostty</a>. Gestiona git worktrees, sesiones de <a href=\"https://docs.anthropic.com/en/docs/claude-code/overview\" class=\"text-wine-light hover:underline\">Claude Code</a> y servidores dev desde una sola ventana. Cada workstream tiene su branch, terminal y agent, todo en paralelo, todo a velocidad nativa."
[hero_demo_tab]
other = "Demo"
[hero_download]
