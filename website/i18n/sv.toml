[features_label]
other = "Funktioner"
[features_title]
other = "Allt i ett fönster."
[features_desc]
other = "Sluta jonglera mellan terminaler, webbläsare och git-klienter. Varje arbetsflöde är en fristående utvecklingsmiljö."
[feat_worktrees_title]
other = "Git-worktrees"
[feat_worktrees_desc]
other = "Varje arbetsflöde får sin egen gren och worktree. Växla mellan uppgifter utan att stasha, med .env-filer automatiskt symlänkade."
[feat_claude_title]
other = "Claude Code"
[feat_claude_desc]
other = "Integrerad AI-agent med sessionsbeständighet. Återuppta konversationer efter omstarter med automatiska sessions-ID:n."
[feat_tmux_title]
other = "Tmux-beständighet"
[feat_tmux_desc]
other = "Agentsessioner överlever omstarter via tmux på en dedikerad socket. Inget mer tappat sammanhang eller avbrutna arbetsflöden."
[feat_scripts_title]
other = "Setup- och körskript"
[feat_scripts_desc]
other = "Konfigurera setup-, kör- och nedrivningsskript per projekt. Kompatibelt med emdash-, conductor- och superset-konfigurationer."
[feat_browser_title]
other = "Inbäddad webbläsare"
[feat_browser_desc]
other = "WKWebView-webbläsarflik med deterministisk porttilldelning. Förhandsgranska din app utan att lämna arbetsytan."
[feat_github_title]
other = "GitHub-integration"
[feat_github_desc]
other = "Se repoinformation, öppna PR:er och grenstatus för PR:er direkt i projektvyn. Drivs av gh CLI."

[how_label]
other = "Så fungerar det"
[how_title]
other = "Tre steg till parallell utveckling."
[how_desc]
other = "Gå från repo till körande arbetsflöde på sekunder. Varje arbetsflöde är isolerat och fristående."
[step1_title]
other = "Lägg till ett projekt"
[step1_desc]
other = "Dra en katalog till sidofältet, eller skapa en ny. Factory Floor upptäcker git-repon, installerade verktyg och GitHub-anslutningar automatiskt."
[step2_title]
other = "Skapa ett arbetsflöde"
[step2_desc]
other = "En ny git-worktree med en färsk gren, en Claude Code-session, en terminal och en webbläsarflik. Allt kopplat och redo att köra."
[step3_title]
other = "Koda med AI"
[step3_desc]
other = "Kodningsagenten döper om din gren för att matcha uppgiften. Setup-skript installerar beroenden. Växla mellan arbetsflöden utan att tappa tillstånd."

[config_label]
other = "Konfiguration"
[config_title]
other = "Enkel skriptkonfiguration."
[config_desc]
other = "Automatisera ditt arbetsflödes livscykel med setup-, kör- och nedrivningsskript. Installera beroenden när en worktree skapas, starta utvecklingsservrar vid behov och rensa resurser vid arkivering."
