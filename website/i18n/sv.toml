[hero_desc]
other = "En nativ macOS-app byggd på <a href=\"https://ghostty.org\" class=\"text-wine-light hover:underline\">Ghosttys</a> GPU-renderade terminal. Hanterar git-worktrees, Claude Code-sessioner och utvecklingsservrar från ett enda fönster. Varje arbetsflöde får sin egen gren, terminal och AI-agent — allt körs parallellt, allt i nativ hastighet."
