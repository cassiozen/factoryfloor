[features_label]
other = "Features"
[features_title]
other = "Allt i ett fönster."
[features_desc]
other = "Sluta jonglera terminaler, browsers och git-klienter. Varje workstream är en komplett dev-miljö."
[feat_worktrees_title]
other = "Git Worktrees"
[feat_worktrees_desc]
other = "Varje workstream får egen branch och worktree. Byt task utan stash. .env-filer symlänkas automatiskt."
[feat_claude_title]
other = "Claude Code"
[feat_claude_desc]
other = "Integrerad <a href='https://docs.anthropic.com/en/docs/claude-code/overview' class='text-wine-light no-underline hover:underline'>Claude Code</a>-agent med session persistence. Återuppta konversationer efter restart med automatiska session IDs."
[feat_tmux_title]
other = "Tmux persistence"
[feat_tmux_desc]
other = "Agent sessions överlever restarts via tmux på en dedicerad socket. Ingen tappad kontext, inga avbrutna workflows."
[feat_scripts_title]
other = "Setup & run scripts"
[feat_scripts_desc]
other = "Konfigurera setup, run och teardown scripts per projekt via .factoryfloor.json."
[feat_browser_title]
other = "Inbyggd browser"
[feat_browser_desc]
other = "WKWebView browser tab med deterministiska portar. Previewa din app utan att lämna workspace."
[feat_github_title]
other = "GitHub-integration"
[feat_github_desc]
other = "Repo-info, öppna PRs och branch PR-status direkt i projektvyn. Via gh CLI."

[how_label]
other = "Hur det funkar"
[how_title]
other = "Tre steg till parallell utveckling."
[how_desc]
other = "Från repo till körande workstream på sekunder. Varje workstream isolerad och fristående."
[step1_title]
other = "Lägg till ett projekt"
[step1_desc]
other = "Dra en directory till sidebaren eller skapa en ny. Factory Floor detekterar git repos, installerade tools och GitHub-kopplingar automatiskt."
[step2_title]
other = "Skapa en workstream"
[step2_desc]
other = "En ny worktree med fresh branch, Claude Code session, terminal och browser tab. Allt uppkopplat, redo att köra."
[step3_title]
other = "Koda med AI"
[step3_desc]
other = "Agenten namnger din branch efter tasken. Setup scripts installerar dependencies. Byt workstream utan att tappa state."

