# Hero
[hero_badge]
other = "Open Source"
[hero_title_1]
other = "Dein"
[hero_title_accent]
other = "KI-gestützter"
[hero_title_2]
other = "Dev-Arbeitsbereich."
[hero_desc]
other = "Eine native macOS-App auf Basis von <a href=\"https://ghostty.org\" class=\"text-wine-light hover:underline\">Ghosttys</a> GPU-gerendertem Terminal. Verwaltet Git-Worktrees, <a href=\"https://docs.anthropic.com/en/docs/claude-code/overview\" class=\"text-wine-light hover:underline\">Claude Code</a>-Sitzungen und Dev-Server in einem einzigen Fenster. Jeder Workstream bekommt seinen eigenen Branch, sein eigenes Terminal und seinen eigenen KI-Agenten — alles läuft parallel, alles in nativer Geschwindigkeit."
[hero_demo_tab]
other = "Demo"
[hero_download]
other = "Herunterladen"
[hero_source]
other = "Quellcode ansehen"

# Features
[features_label]
other = "Funktionen"
[features_title]
other = "Alles in einem Fenster."
[features_desc]
other = "Schluss mit dem Jonglieren zwischen Terminals, Browsern und Git-Clients. Jeder Workstream ist eine eigenständige Entwicklungsumgebung."
[feat_worktrees_title]
other = "Git-Worktrees"
[feat_worktrees_desc]
other = "Jeder Workstream bekommt seinen eigenen Branch und Worktree. Wechsle zwischen Aufgaben, ohne zu stashen — .env-Dateien werden automatisch verknüpft."
[feat_claude_title]
other = "Claude Code"
[feat_claude_desc]
other = "Integrierter <a href='https://docs.anthropic.com/en/docs/claude-code/overview' class='text-wine-light no-underline hover:underline'>Claude Code</a>-Agent mit Sitzungspersistenz. Setze Gespräche über App-Neustarts hinweg fort, dank automatischer Sitzungs-IDs."
[feat_tmux_title]
other = "Tmux-Persistenz"
[feat_tmux_desc]
other = "Agent-Sitzungen überleben App-Neustarts dank tmux auf einem dedizierten Socket. Kein verlorener Kontext, keine unterbrochenen Arbeitsabläufe mehr."
[feat_scripts_title]
other = "Setup- und Run-Skripte"
[feat_scripts_desc]
other = "Konfiguriere Setup-, Run- und Teardown-Skripte pro Projekt über .factoryfloor.json."
[feat_browser_title]
other = "Integrierter Browser"
[feat_browser_desc]
other = "Integrierter Browser mit automatischer Port-Erkennung. Der lauschende Port des Run-Skripts wird automatisch erkannt und der Browser navigiert dorthin. Sieh dir deine App an, ohne den Arbeitsbereich zu verlassen."
[feat_review_title]
other = "Review-Guide"
[feat_review_desc]
other = "Änderungen sicher reviewen. Der Agent erklärt sein Vorgehen mit Lesereihenfolge und Inline-Annotationen in jedem Worktree."
[feat_editor_title]
other = "Code-Editor"
[feat_editor_desc]
other = "Integrierter Monaco-Editor mit Syntax-Highlighting und Sprachunterstützung. Schnelle Bearbeitungen ohne den Arbeitsbereich zu verlassen."
[feat_github_title]
other = "GitHub-Integration"
[feat_github_desc]
other = "Sieh Repo-Infos, offene PRs und Branch-PR-Status direkt in der Projektansicht. Unterstützt durch die gh CLI."
[feat_soon_title]
other = "Mehr kommt"
[feat_soon_desc]
other = "Neue Funktionen sind in Arbeit."

# How it works
[how_label]
other = "So funktioniert's"
[how_title]
other = "Drei Schritte zur parallelen Entwicklung."
[how_desc]
other = "Vom Repo zum laufenden Workstream in Sekunden. Jeder Workstream ist isoliert und eigenständig."
[step1_title]
other = "Projekt hinzufügen"
[step1_desc]
other = "Ziehe ein Verzeichnis auf die Seitenleiste oder erstelle ein neues. Factory Floor erkennt Git-Repos, installierte Tools und GitHub-Verbindungen automatisch."
[step2_title]
other = "Workstream erstellen"
[step2_desc]
other = "Ein neuer Git-Worktree mit einem frischen Branch, einer Claude-Code-Sitzung, einem Terminal und einem Browser-Tab. Port-Erkennung erfolgt automatisch — der Browser öffnet deinen Dev-Server, sobald er lauscht."
[step3_title]
other = "Mit KI programmieren"
[step3_desc]
other = "Der Coding-Agent benennt deinen Branch passend zur Aufgabe um. Setup-Skripte installieren Abhängigkeiten. Wechsle zwischen Workstreams, ohne den Zustand zu verlieren."

# Config
[config_label]
other = "Konfiguration"
[config_title]
other = "Einfache Skript-Konfiguration."
[config_desc]
other = "Automatisiere den Workstream-Lebenszyklus mit Setup-, Run- und Teardown-Skripten. Installiere Abhängigkeiten bei der Worktree-Erstellung, starte Dev-Server auf Abruf und räume Ressourcen beim Archivieren auf."
[config_add]
other = "Füge eine"
[config_or_use]
other = "deinem Projektverzeichnis hinzu."
[config_hook]
other = "Hook"
[config_when]
other = "Wann es läuft"
[config_setup_desc]
other = "Einmal, wenn ein Workstream erstellt wird. Zum Installieren von Abhängigkeiten oder Build-Schritten."
[config_run_desc]
other = "Auf Abruf über den Environment-Tab. Eingebettet in ff-run für automatische Port-Erkennung."
[config_teardown_desc]
other = "Wenn ein Workstream archiviert wird. Zum Aufräumen, wie das Stoppen von Containern."
[config_optional_note]
other = "Alle Felder sind optional. Skripte laufen im Workstream-Verzeichnis mit deiner Login-Shell."

